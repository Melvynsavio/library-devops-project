<!DOCTYPE html>
<html>

<head>

<title>Library Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#f4f6f9;
}

.sidebar{
height:100vh;
background:#1f2937;
color:white;
padding:20px;
}

.sidebar a{
display:block;
color:white;
padding:10px;
text-decoration:none;
}

.sidebar a:hover{
background:#374151;
}

.card-box{
padding:20px;
border-radius:10px;
color:white;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-md-2 sidebar">

<h3>Library</h3>

<hr>

<a href="/dashboard">Dashboard</a>
<a href="/books">Books</a>
<a href="/members">Members</a>
<a href="/issue">Issue Book</a>
<a href="/return">Return Book</a>
<a href="/reports">Reports</a>

</div>

<div class="col-md-10 p-4">

<h2>Admin Dashboard</h2>

<div class="row mt-4">

<div class="col-md-3">
<div class="card-box bg-primary">
<h4>Total Books</h4>
<h2>{{books}}</h2>
</div>
</div>

<div class="col-md-3">
<div class="card-box bg-success">
<h4>Issued</h4>
<h2>{{issues}}</h2>
</div>
</div>

<div class="col-md-3">
<div class="card-box bg-warning">
<h4>Members</h4>
<h2>{{members}}</h2>
</div>
</div>

<div class="col-md-3">
<div class="card-box bg-danger">
<h4>Overdue</h4>
<h2>{{overdue}}</h2>
</div>
</div>

</div>

<div class="card mt-5 p-4 shadow">

<h4>Library Analytics</h4>

<canvas id="chart"></canvas>

</div>

</div>

</div>

</div>

<script>

const ctx=document.getElementById('chart');

new Chart(ctx,{

type:'bar',

data:{
labels:['Books','Issued','Members','Overdue'],

datasets:[{

label:'Library Data',

data:[{{books}},{{issues}},{{members}},{{overdue}}]

}]
}

})

</script>

</body>

</html>
