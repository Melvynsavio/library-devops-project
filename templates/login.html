<!DOCTYPE html>
<html>
<head>
<title>Library System Login</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
padding:0;
height:100vh;

background: linear-gradient(135deg,#141e30,#243b55);

display:flex;
justify-content:center;
align-items:center;
}

.login-container{

background:white;
padding:40px;
border-radius:12px;

box-shadow:0 10px 25px rgba(0,0,0,0.3);

width:350px;
text-align:center;
}

.login-container h1{
margin-bottom:25px;
color:#333;
}

input{

width:100%;
padding:12px;
margin:10px 0;

border-radius:8px;
border:1px solid #ccc;

font-size:16px;
}

input:focus{
border-color:#4CAF50;
outline:none;
}

button{

width:100%;
padding:12px;

background:#4CAF50;
border:none;

color:white;
font-size:16px;

border-radius:8px;
cursor:pointer;

transition:0.3s;
}

button:hover{
background:#2e7d32;
}

.logo{
font-size:40px;
margin-bottom:10px;
}

.subtitle{
color:#777;
margin-bottom:20px;
}

</style>
</head>

<body>

<div class="login-container">

<div class="logo">📚</div>

<h1>Library Login</h1>

<p class="subtitle">Library Management System</p>

<form method="POST">

<input type="text" name="username" placeholder="Enter Username" required>

<input type="password" name="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
