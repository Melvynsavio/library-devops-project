<!DOCTYPE html>
<html>
<head>
<title>Library Management System</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(120deg,#1f4037,#99f2c8);
}

/* SIDEBAR */

.sidebar{
width:220px;
height:100vh;
background:#111;
position:fixed;
padding-top:30px;
}

.sidebar h2{
color:white;
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
padding:14px 20px;
text-decoration:none;
font-size:16px;
}

.sidebar a:hover{
background:#4CAF50;
}

/* MAIN AREA */

.main{
margin-left:220px;
padding:40px;
}

.card{

background:white;
padding:30px;
border-radius:10px;

box-shadow:0 10px 25px rgba(0,0,0,0.2);

}

/* BUTTON */

.btn{
padding:12px 20px;
background:#4CAF50;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.btn:hover{
background:#2e7d32;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#4CAF50;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<div class="sidebar">

<h2>📚 Library</h2>

<a href="/dashboard">Dashboard</a>
<a href="/books">Books</a>
<a href="/members">Members</a>
<a href="/issue">Issue Book</a>
<a href="/return">Return Book</a>
<a href="/reports">Reports</a>

</div>

<div class="main">

<div class="card">

{% block content %}

{% endblock %}

</div>

</div>

</body>
</html>
