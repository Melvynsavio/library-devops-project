name: Full DevOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:

  build-test-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install flask pytest selenium reportlab

    - name: Run Unit Tests
      run: pytest

    - name: Build Docker Image
      run: docker build -t library-system .

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker Image
      run: |
        docker tag library-system ${{ secrets.DOCKER_USERNAME }}/library-system:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/library-system:latest