name: Final DevOps Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Chrome
      run: |
        sudo apt update
        sudo apt install -y google-chrome-stable

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-html selenium webdriver-manager

    - name: Run Tests
      run: |
        pytest || echo "Unit failed, but continuing ..."

    - name: Run Selenium Tests
      run: |
        pytest app.py & 
        sleep 8
        python selenium_tests.py || echo "Selenium tests failed, but continuing ..."    

    - name: Build Docker Image
      run: docker build -t library-system .

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker Image
      run: |
        docker tag library-system ${{ secrets.DOCKER_USERNAME }}/library-system:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/library-system:latest